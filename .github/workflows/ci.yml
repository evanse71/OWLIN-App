name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn sqlite3
      
      - name: Run FK enforcement test
        run: |
          cd backend
          python tests/test_db_fk.py
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
      
      - name: Install Node dependencies
        run: npm ci
      
      - name: Run frontend tests
        run: |
          npm run type-check
          npm run lint
          npm run build
      
      - name: Block sensitive files
        run: |
          set -euo pipefail
          git diff --name-only origin/${{ github.base_ref || "HEAD^" }}...HEAD > changed.txt || true
          PATTERN="\.(db|db-shm|db-wal|sqlite|bak|backup|log)$"
          if grep -E "$PATTERN" changed.txt; then
            echo "::error::Sensitive file pattern detected. Add to .gitignore or remove."
            exit 1
          fi
